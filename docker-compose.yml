# Docker Compose for Laravel Backend (Production with External Database)
version: '3.8'

services:
  # Laravel Application
  laravel-app:
    build: .
    container_name: laravel-backend
    ports:
      - "8000:80"
    volumes:
      - ./storage:/var/www/html/storage
      - ./public/storage:/var/www/html/public/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=sql7.freesqldatabase.com
      - DB_PORT=3306
      - DB_DATABASE=sql7789809
      - DB_USERNAME=sql7789809
      - DB_PASSWORD=GUufRJwtjU
      - APP_URL=https://communiti-server.onrender.com
      - CACHE_DRIVER=file
    networks:
      - laravel-network

  # Queue Worker Service
  queue-worker:
    build: .
    container_name: laravel-queue-worker
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=sql7.freesqldatabase.com
      - DB_PORT=3306
      - DB_DATABASE=sql7789809
      - DB_USERNAME=sql7789809
      - DB_PASSWORD=GUufRJwtjU
      - APP_URL=https://communiti-server.onrender.com
      - CACHE_DRIVER=file
    depends_on:
      - laravel-app
    networks:
      - laravel-network
    restart: unless-stopped

  # Scheduler Service
  scheduler:
    build: .
    container_name: laravel-scheduler
    command: >
      sh -c "while true; do
        php artisan schedule:run
        sleep 60
      done"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=sql7.freesqldatabase.com
      - DB_PORT=3306
      - DB_DATABASE=sql7789809
      - DB_USERNAME=sql7789809
      - DB_PASSWORD=GUufRJwtjU
      - APP_URL=https://communiti-server.onrender.com
      - CACHE_DRIVER=file
    depends_on:
      - laravel-app
    networks:
      - laravel-network
    restart: unless-stopped


networks:
  laravel-network:
    driver: bridge
